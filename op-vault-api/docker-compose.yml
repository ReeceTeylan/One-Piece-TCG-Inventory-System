services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: opvault
      POSTGRES_PASSWORD: opvault
      POSTGRES_DB: opvault
    ports: ["5432:5432"]
    volumes: ["opvault_pg:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opvault"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build: .
    depends_on:
      db: { condition: service_healthy }
    environment:
      DATABASE_URL: "postgresql://opvault:opvault@db:5432/opvault?schema=public"
    env_file: [.env]
    ports: ["4000:4000"]
    command: sh -c "npx prisma db push --skip-generate && npm run prisma:seed && node dist/main"
volumes:
  opvault_pg:
