<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OP-Vault — TCG Inventory</title>
    <script>
      // Theme: default to dark on first visit; restore the user's saved choice afterward.
      (function () {
        try {
          var t = localStorage.getItem('op_theme');
          if (!t) { t = 'dark'; localStorage.setItem('op_theme', t); }
          document.documentElement.classList.toggle('dark', t === 'dark');
        } catch (e) { document.documentElement.classList.add('dark'); }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
